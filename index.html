<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="enot" content="5bae451b" /> <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DuckCloudNode | Приватные прокси-решения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0c;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 30% 20%, #1a1a2e 0%, #0a0a0c 70%);
    }

    .grid-mesh {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: slowDrift 25s infinite alternate ease-in-out;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      will-change: transform;
      z-index: 1;
    }
    .orb-1 { width: 600px; height: 600px; background: #4a6cf7; top: -250px; left: -150px; animation: floatOrb 18s infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: #7b2cbf; bottom: -200px; right: -150px; animation: floatOrb 22s infinite alternate-reverse; }
    .orb-3 { width: 350px; height: 350px; background: #0ea5e9; top: 50%; left: 60%; animation: floatOrb 20s infinite alternate; opacity: 0.1; }

    @keyframes slowDrift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-30px, -20px) scale(1.05); }
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(50px, 70px) rotate(25deg); }
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 24px;
      perspective: 1500px;
    }

    .glass-card {
      background: rgba(20, 20, 28, 0.55);
      backdrop-filter: blur(45px) saturate(180%);
      -webkit-backdrop-filter: blur(45px) saturate(180%);
      border-radius: 48px;
      padding: 44px 36px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.06);
      text-align: center;
      transition: transform 0.3s ease;
      animation: levitate 8s ease-in-out infinite;
    }

    @keyframes levitate {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #b0d4ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 25px rgba(0,160,255,0.3);
    }

    .subtitle {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(220, 220, 240, 0.8);
      margin-bottom: 32px;
    }

    .feature-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 32px;
      gap: 10px;
    }
    .feature-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(10px);
      padding: 12px 14px;
      border-radius: 24px;
      font-size: 0.8rem;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.04);
      flex: 1;
    }
    .feature-item span:first-child { font-size: 1.4rem; margin-bottom: 4px; }

    .price-badge {
      display: inline-flex;
      align-items: baseline;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      border-radius: 100px;
      padding: 14px 32px;
      margin-bottom: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .price { font-size: 2.5rem; font-weight: 700; color: #7dd3fc; margin-right: 6px; text-shadow: 0 0 20px rgba(125, 211, 252, 0.6); }
    .period { font-size: 1rem; color: #a0a0b8; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #ffffff;
      font-weight: 600;
      font-size: 1.15rem;
      padding: 16px 38px;
      border-radius: 40px;
      text-decoration: none;
      margin-bottom: 10px;
      box-shadow: 0 12px 28px rgba(14, 165, 233, 0.45);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      width: 100%;
      gap: 8px;
    }
    .btn:hover { transform: scale(1.02); box-shadow: 0 15px 35px rgba(56, 189, 248, 0.6); }

    #error-toast {
      display: none;
      background: rgba(255, 69, 58, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 69, 58, 0.3);
      color: #ff9f9f;
      padding: 16px;
      border-radius: 24px;
      font-size: 0.9rem;
      margin-top: 15px;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .doc-content {
      display: none;
      text-align: left;
      background: rgba(255, 255, 255, 0.03);
      padding: 20px;
      border-radius: 24px;
      margin-top: 20px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #cbd5e1;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    footer {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer div { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
    footer a { color: #94a3b8; text-decoration: none; transition: 0.2s; cursor: pointer; }
    footer a:hover { color: #fff; }

    @media (max-width: 500px) {
      .glass-card { padding: 32px 24px; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

    function showDoc(type) {
      const viewer = document.getElementById('doc-viewer');
      if (type === 'privacy') {
        viewer.innerHTML = docs.privacy;
      } else if (type === 'terms') {
        viewer.innerHTML = docs.terms;
      }
      viewer.style.display = 'block';
      // Плавная прокрутка к документу
      viewer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Эффект 3D наклона карточки (параллакс мыши)
    const card = document.querySelector('.glass-card');
    window.addEventListener('mousemove', (e) => {
      const xAxis = (e.clientX / window.innerWidth - 0.5) * 10;
      const yAxis = (e.clientY / window.innerHeight - 0.5) * -10;
      card.style.transform = `rotateX(${yAxis}deg) rotateY(${xAxis}deg)`;
    });
    window.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
